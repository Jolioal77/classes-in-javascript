<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inheritance</title>
</head>
<body>
    <p id="names"></p>

    <script>
        class Car{
            constructor(brand){
                this.carname = brand;
            }
            present(){
                return "I have a " + this.carname;
            }
        }

         class Model extends Car{
            constructor(brand, mod){
                super(brand);
                this.model = mod;
            }
            show(){
                return this.present() + "it is a " + this.model;
            }
         }

         let myCar = new Model("Rolls Royce", "Boat Tail");
         document.getElementById("names").innerHTML = myCar.show();
    </script>
</body>
</html>
