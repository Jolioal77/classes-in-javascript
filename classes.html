<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Classes in Javascript </h1>
    <p id="student1"></p>
    <p id="student2"></p>

    <script>
        class Student{
            constructor(name, year){
                this.name = name;
                this.year = year;
            }

            age(){
                let date = new Date();
                return date.getFullYear() - this.year;
            }
        }

        const student1 = new Student("Theodore", 2000);
        document.getElementById("student1").innerHTML = "My name is" + student1.name + "I am  born in" + student1.year + "and my age is" + student1.age();
        
        const student2 = new Student("Alice", 2009);
        document.getElementById("student2").innerHTML = "My name is" + student2.name + "I am  born in" + student2.year + "and my age is" + student2.age();

    </script>
</body>
</html>
